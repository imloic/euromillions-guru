server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Sert les .gz précompressés au build (zéro CPU au runtime) ;
    # gzip dynamique en filet pour le reste.
    gzip_static on;
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types application/json application/javascript text/css image/svg+xml text/plain application/xml;

    include /etc/nginx/snippets/security-headers.conf;

    # Données : changent 2x/semaine — cache court + revalidation en arrière-plan
    location ~* \.json$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=3600" always;
    }

    # Assets immuables (ne changent qu'au déploiement)
    location ~* \.(?:woff2|png|jpg|jpeg|svg|ico)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* \.(?:html|xml|txt)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
    }

    location = / {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
    }

    # Fichiers cachés (.git, .env…)
    location ~ /\. {
        deny all;
        return 404;
    }
}
