# Headers de sécurité partagés.
# nginx : un add_header dans un bloc location ANNULE tous ceux hérités du
# niveau server — ce fichier doit donc être inclus dans server {} ET dans
# chaque location qui déclare son propre add_header (ex: Cache-Control).
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://stats.imloic.cloud; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://stats.imloic.cloud; connect-src 'self' https://stats.imloic.cloud; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
